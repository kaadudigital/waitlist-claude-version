<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family:'Banter Grotesk'; src:url('../fonts/BanterGrotesk-Regular.woff2') format('woff2'); font-weight:400; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; font-family: 'Banter Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; }
.swatch { width: 110px; }
.swatch-block { width: 110px; height: 70px; border: 1px solid rgba(0,0,0,0.08); }
.swatch-name { font-weight: 700; font-size: 12px; margin-top: 6px; }
.swatch-hex  { font-size: 11px; color: #666; font-family: monospace; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="swatch-block" style="background:#ACFF64;"></div>
    <div class="swatch-name">Lime</div><div class="swatch-hex">#ACFF64</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#EDF731;"></div>
    <div class="swatch-name">Yellow</div><div class="swatch-hex">#EDF731</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#B7D9FF;"></div>
    <div class="swatch-name">Sky Blue</div><div class="swatch-hex">#B7D9FF</div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#FFFFF5; border:1px solid #ddd;"></div>
    <div class="swatch-name">Cream</div><div class="swatch-hex">#FFFFF5</div>
  </div>
</div>
</body>
</html>
