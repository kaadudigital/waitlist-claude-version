<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family:'Fagies'; src:url('../fonts/Fagies.ttf') format('truetype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Banter Grotesk'; src:url('../fonts/BanterGrotesk-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#ffffff; padding:20px 24px; display:flex; gap:20px; flex-wrap:wrap; align-items:flex-start; }
.card { background:#fff; padding:20px 24px; display:flex; flex-direction:column; gap:10px; }
.card-heading { font-family:'Fagies',sans-serif; font-size:16px; color:#AE0000; text-transform:uppercase; letter-spacing:0.04em; }
.card-sub { font-family:'Banter Grotesk',sans-serif; font-size:11px; color:#000; text-transform:uppercase; letter-spacing:0.06em; }
.logo-box { display:flex; align-items:center; justify-content:center; padding:24px 28px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-heading">Wordmark — On white</div>
  <div class="logo-box" style="background:#fff; border:1.5px solid #E6E6E6; width:260px; height:100px;">
    <img src="../assets/logo/Kaadu_wordmark_red.svg" style="height:48px; width:auto;">
  </div>
  <div class="card-sub">On white / cream background</div>
</div>

<div class="card">
  <div class="card-heading">Wordmark — On pink</div>
  <div class="logo-box" style="background:#FFC5FF; border:1.5px solid #FFC5FF; width:260px; height:100px;">
    <img src="../assets/logo/Kaadu_wordmark_red.svg" style="height:48px; width:auto;">
  </div>
  <div class="card-sub">On brand pink background</div>
</div>

<div class="card">
  <div class="card-heading">Wordmark — On violet</div>
  <div class="logo-box" style="background:#542A76; width:260px; height:100px;">
    <img src="../assets/logo/Kaadu_wordmark_red.svg" style="height:48px; width:auto; filter:brightness(0) invert(1);">
  </div>
  <div class="card-sub">On dark / violet background</div>
</div>

<div class="card">
  <div class="card-heading">Icon mark — On white</div>
  <div class="logo-box" style="background:#fff; border:1.5px solid #E6E6E6; width:100px; height:100px;">
    <img src="../assets/logo/Kaadu_favicon_purple.svg" style="height:52px; width:auto;">
  </div>
  <div class="card-sub">Favicon / icon only</div>
</div>

</body>
</html>
