<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f0f0f0; padding: 16px 20px; font-family: 'DM Sans', sans-serif; }
  .scale { display: flex; flex-wrap: wrap; gap: 8px; }
  .token { background: white; border: 1px solid #E6E6E6; border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .box { background: #AE0000; border-radius: 2px; flex-shrink: 0; }
  .label { font-size: 11px; color: #666; }
  .val { font-size: 12px; font-weight: 700; color: #000; font-family: monospace; }
</style>
</head>
<body>
<div class="scale">
  <div class="token"><div class="box" style="width:4px;height:4px;"></div><div><div class="val">4px</div><div class="label">--space-1 · xs</div></div></div>
  <div class="token"><div class="box" style="width:8px;height:8px;"></div><div><div class="val">8px</div><div class="label">--space-2 · sm</div></div></div>
  <div class="token"><div class="box" style="width:12px;height:12px;"></div><div><div class="val">12px</div><div class="label">--space-3</div></div></div>
  <div class="token"><div class="box" style="width:16px;height:16px;"></div><div><div class="val">16px</div><div class="label">--space-4 · md</div></div></div>
  <div class="token"><div class="box" style="width:24px;height:16px;"></div><div><div class="val">24px</div><div class="label">--space-6</div></div></div>
  <div class="token"><div class="box" style="width:32px;height:16px;"></div><div><div class="val">32px</div><div class="label">--space-8 · lg</div></div></div>
  <div class="token"><div class="box" style="width:48px;height:16px;"></div><div><div class="val">48px</div><div class="label">--space-12</div></div></div>
  <div class="token"><div class="box" style="width:64px;height:16px;"></div><div><div class="val">64px</div><div class="label">--space-16 · section</div></div></div>
</div>
</body>
</html>
